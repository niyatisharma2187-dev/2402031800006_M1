css
<style>
section{
    width:250px;
    padding :40px;
    background:linear-gradient(135deg,blue,darkred);
    color:white;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 10px 10px rgba(0,0,0,0,1);
    cursor:pointer;
     box-shadow: 0 10px 10px black;

    animation: float 5s ease-in-out infinite;
    transition: transform 0.3s ease;
}
section:hover {
    transform: scale(1.1) ;
   
    animation-play-state:running;
}
@keyframes float {
    0% {
        /* Initial position */
        transform: translateY(0px) rotateX(0deg);
    }
    50% {
        /* Move up 20px and tilt slightly */
        transform: translateY(-20px) rotateX(10deg);
    }
    100% {
        /* Return to start */
        transform: translateY(0px) rotateX(0deg);
    }
}
</style>
