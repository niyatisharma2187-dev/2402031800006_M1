<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" contant="width=device-width,initial-scale=1.0">
        <title>Table</title>
    </head>
    <body>
       <table border="1" cellspacing="2" height="230" width="610">
        <caption> Table tag</caption>
        <tr align="center">
            <td colspan="2">A</td>
            <td colspan="5">B</td>
        </tr>
        <tr align="center">
            <td colspan="1">C</td>
            <td colspan="1">D</td>
            <td colspan="1">E</td>
            <td align="left">F</td>
            <td align="left">G</td>
            <td align="left">H</td>
            <td rowspan="3" valign="top">J</td>
            </tr>
            <tr align="center">
            <td rowspan="2" align="center">K</td>
            <td align="center">M</td>
            <td colspan="2" align="center">N</td>
            <td colspan="2" align="left">I</td>
            </tr>
            <tr align="center">
             <td align="center">L</td>
             <td align="center">P</td>
             <td align="center">O</td>
             <td align="center">I</td>
             <td align="center">H</td>
             </tr>
        </tr>
       </table>
    </body>
</html>
