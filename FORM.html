<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table border="1" align="center" cellspacing="2" height="897" width="810">
            <caption>Registration form</caption>
            <tr align="center" >
                <td colspan="1" align="left">First name</td>
                <td colspan="2" align="left" >
                <input type="text" id="fname" name="fanme" placeholder="your name" required>
            </tr>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Last name</td>
                <td colspan="2" align="left" >
                    <input type="text" id="lname" name="lanme" placeholder="your surname" required>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Contact no</td>
                 <td colspan="2" align="left" >
                    <input type="text" id="contact" name="contact" placeholder="0123456789" required
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Lane Line no</td>
                <td colspan="2" align="left" >
                    <input type="text" id="llno" name="llno" placeholder="(012)-645786" ></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Email</td>
                 <td colspan="2" align="left" >
                    <input type="text" id="email" name="email" placeholder="abc@gmail.com" required></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Password</td>
                 <td colspan="2" align="left" >
                    <input type="text" id="pass" name="pass" placeholder="@#fhgdjh" required></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Dtae of birth</td>
                <td colspan="2" align="left" >
                    <input type="text" id="dob" name="dob" placeholder="dd/mm/yyyy" required></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Age</td>
                 <td colspan="2" align="left" >
                    <input type="text" id="age" name="age" placeholder="24" required></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Gender</td>
                <td colspan="2" align="left" >
                    <input type="radio"  value="male"  name="gender" checked>Male
                    <input type="radio"  value="female" name="gender" >FeMale
                </td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">Address</td>
                    <td colspan="2" align="left" >
                    <input type="textarea" id="address" name="address" placeholder="near gokuldham socity, etc." required></td>
             </tr>
             <tr align="center" >
                <td colspan="1" align="left">City</td>
                     <td colspan="2" align="left" >
                    <select id="city" name="city" required>
                        <option value="junagdh">junagdh</option>
                        <option value="rajkot">rajkot</option>
                        <option value="jamnagr">jamnagr</option>
                        <option value="surat">surat</option>
                        <option value="valsad">valsad</option>
                        <option value="porbandar">porbandar</option>
                        <option value="vapi">vapi</option>
                        <option value="bhavanagr">bhavanagr</option>
                        <option value="bhuj">bhuj</option>
                        <option value="ahmedabad">ahmedabad</option>
                        
                        </select>
                    </td>
             </tr>
              <tr align="center" >
                <td colspan="1" align="left">Pincode</td>
                     <td colspan="2" align="left" >
                    <input type="text" id="pincode" name="pincode" placeholder="654321" required></td>
             </tr>
              <tr align="center" >
                <td colspan="1" align="left">Joining date</td>
                 <td colspan="2" align="left" >
                    <input type="text" id="jdate" name="jdate" placeholder="dd/mm/yyyy" required></td>
             </tr>
              <tr align="center" >
                <td colspan="1" align="left">Confirm your form</td>
                    <td colspan="2" align="left" >
                    <input type="submit" value="submit" >Submit</td>
             </tr>
        </table>
    </form>
</body>
</html>
