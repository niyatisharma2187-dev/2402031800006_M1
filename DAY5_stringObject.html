<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>

//String Object (Some useful methods)
var str = "Hello World";
document.write("<h3>var str = Hello World</h3>");

    // charAt()
    document.write("str.charAt(1): " + str.charAt(1));
    // concat()
    document.write("<br> str.concat(' JavaScript'): " + str.concat(" JavaScript"));
    // indexOf()
    document.write("<br> str.indexOf('o'): " + str.indexOf("o"));
    // lastIndexOf()
    document.write("<br> str.lastIndexOf('o'): " + str.lastIndexOf("o"));
    // search()
    document.write("<br> str.search('World'): " + str.search("World"));
    // match()
    document.write("<br> str.match('World'): " + str.match("World"));
    // replace()
    document.write("<br> str.replace('World','JS'): " + str.replace("World", "JS"));
    // substr()
    document.write("<br> str.substr(0,5): " + str.substr(0,5));
    // substring()
    document.write("<br> str.substring(0,5): " + str.substring(0,5));
    // slice()
    document.write("<br> str.slice(0,5): " + str.slice(0,5));
    // toLowerCase()
    document.write("<br> str.toLowerCase(): " + str.toLowerCase());
    // toLocaleLowerCase()
    document.write("<br> str.toLocaleLowerCase(): " + str.toLocaleLowerCase());
    // toUpperCase()
    document.write("<br> str.toUpperCase(): " + str.toUpperCase());
    // toLocaleUpperCase()
    document.write("<br> str.toLocaleUpperCase(): " + str.toLocaleUpperCase());
    // toString()
    document.write("<br> str.toString(): " + str.toString());
    // valueOf()
    document.write("<br> str.valueOf(): " + str.valueOf());
    // split()
    document.write("<br> str.split(' '): " + str.split(" "));
    // trim()
    var str2 = "   Hello JS   ";
    document.write("<br> str2.trim(): " + str2.trim());
    </script>
</body>
</html>
